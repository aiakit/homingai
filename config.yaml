name: homgingai
version: 1.0.0
slug: homgingai_homeassistant
description: homgingai Client/Server add-on for Home Assistant with support
url: https://github.com/aiakit/homgingai
boot: auto
web_ui: "http://this:7999"
ports:
  7999/tcp: 7999
init: false
host_network: true
audio: true
homeassistant_api: true
#startup: services
panel_icon: mdi:robot-dead
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
map:
  - addons:rw
  - share:rw
  - media:rw
  - ssl:rw
  - addon_config:rw
  - homeassistant_config:rw  # 允许访问 Home Assistant 配置
options:
  phone: 手机号用于消息通知
  openai_key: openai密钥
schema:
  phone: str
  openai_key: str
